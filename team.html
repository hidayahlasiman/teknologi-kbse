      const MotionH1 = motion ? motion.h1 : (props) => <h1 {...props}>{props.children}</h1>;
      const MotionP = motion ? motion.p : (props) => <p {...props}>{props.children}</p>;

        {

            { name: "Nazri Muid", nickname: "Nazri", title: "Managing Director", imageUrl: "image/nazri.jpg", email: "nazri@kbse.com.my", bio: "Driving the vision and strategic growth of Teknologi KBSE with over two decades of industry expertise." },
            { name: "Amran Bachok", nickname: "Amran", title: "Technical Director", imageUrl: "image/amran.jpg", email: "amran@kbse.com.my", bio: "Leading technical innovation and engineering excellence across all our core service sectors." }

      // === COMPONENTS ===

                        <DropdownLink href="team.html">Leadership & Team</DropdownLink>

                      </Dropdown>
                      <Dropdown title="Projects & Services">
                        <DropdownLink href="product.html">Projects / Products</DropdownLink>
                        <DropdownLink href="service.html">Services</DropdownLink>
                      </Dropdown>
                      <NavLink href="partner-client.html">Partners & Clients</NavLink>
                      <NavLink href="galleryActivity.html">Activities & Gallery</NavLink>
                      <NavLink href="contact.html">Contact Us</NavLink>
                    </div>
                  </div>

                  {/* Mobile menu button */}
                  <div className="md:hidden flex items-center">
                    <button
                      onClick={() => setIsMenuOpen(!isMenuOpen)}
                      className="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-white hover:bg-gray-700 focus:outline-none"
                    >
                      <span className="sr-only">Open main menu</span>
                      {isMenuOpen ? (
                        <svg className="block h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                      ) : (
                        <svg className="block h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16M4 18h16" />

                  </div>
                </div>
              </div>

              {/* Mobile Menu */}
              <div className={`md:hidden transition-all duration-300 ease-in-out ${isMenuOpen ? 'max-h-screen opacity-100' : 'max-h-0 opacity-0 overflow-hidden'}`}>
                <div className="px-2 pt-2 pb-3 space-y-1 sm:px-3 bg-gray-900/95 backdrop-blur-lg border-t border-gray-800">

                  <div className="px-3 py-2">
                    <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">About Us</p>
                    <div className="pl-4 space-y-1">
                      <a href="overview.html" className="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-amber-400 hover:bg-gray-700">Company Overview</a>
                      <a href="team.html" className="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-amber-400 hover:bg-gray-700">Leadership & Team</a>
                      <a href="cert-award.html" className="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-amber-400 hover:bg-gray-700">Certificates & Awards</a>
                    </div>
                  </div>

                  <div className="px-3 py-2">
                    <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Projects & Services</p>
                    <div className="pl-4 space-y-1">
                      <a href="product.html" className="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-amber-400 hover:bg-gray-700">Projects / Products</a>
                      <a href="service.html" className="block px-3 py-2 rounded-md text-base font-medium text-gray-300 hover:text-amber-400 hover:bg-gray-700">Services</a>
                    </div>

                  <a href="partner-client.html" className="block px-3 py-2 rounded-md text-base font-medium text-white hover:text-amber-400 hover:bg-gray-700">Partners & Clients</a>
                  <a href="galleryActivity.html" className="block px-3 py-2 rounded-md text-base font-medium text-white hover:text-amber-400 hover:bg-gray-700">Activities & Gallery</a>
                  <a href="contact.html" className="block px-3 py-2 rounded-md text-base font-medium text-white hover:text-amber-400 hover:bg-gray-700">Contact Us</a>
                </div>
              </div>
            </nav>
          </header>
        );
      };

      const Footer = () => (
          <footer className="bg-gray-900/80 backdrop-blur-sm text-gray-400 py-8 relative z-10">
              <div className="max-w-7xl mx-auto px-6 lg:px-8">
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                      <div className="space-y-4">
                        <img src="image/logo kbse white.png" alt="Teknologi KBSE" className="h-12 w-auto" />
                        <p className="text-sm">Teknologi KBSE Sdn Bhd (0759215-M)</p>
                        <p className="text-sm">1-11-2 & 1-11-3, Presint Alami, Pusat Perdagangan Worldwide 2 Persiaran Akuatik, Seksyen 13, 40100 Shah Alam, Selangor, Malaysia.</p>

                          <ul className="mt-4 space-y-2">
                              <li><NavLink href="index.html">Home</NavLink></li>
                              <li><NavLink href="overview.html">About Us</NavLink></li>
                              <li><NavLink href="product.html">Projects & Services</NavLink></li>
                              <li><NavLink href="partner-client.html">Partners & Clients</NavLink></li>
                              <li><NavLink href="contact.html">Contact Us</NavLink></li>
                          </ul>
                      </div>
                      <div>
                          <h3 className="text-sm font-semibold text-white tracking-wider uppercase">Discover</h3>

                              <li><NavLink href="cert-award.html">Certificates & Awards</NavLink></li>
                              <li><NavLink href="galleryActivity.html">Activities & Gallery</NavLink></li>
                              <li><NavLink href="overview.html">Company Overview</NavLink></li>

                  </div>
              </div>
          </footer>
      );

      const LeadershipSlider = () => {
        const [index, setIndex] = useState(0);

        const next = () => setIndex((prev) => (prev + 1) % leadershipList.length);
        const prev = () => setIndex((prev) => (prev - 1 + leadershipList.length) % leadershipList.length);

        useEffect(() => {
          const timer = setInterval(next, 8000);
          return () => clearInterval(timer);
        }, []);

        const current = leadershipList[index];

        if (!MotionDiv || !AnimatePresence) return <div className="text-center py-20">Loading Slider...</div>;

        return (
          <div className="relative w-full min-h-[500px] flex items-center justify-center py-12">
            <div className="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-12 items-center px-4">
              
              {/* Left Side: Info */}
              <div className="order-2 lg:order-1 space-y-8">
                <AnimatePresence mode="wait">
                  <MotionDiv
                    key={`info-${index}`}
                    initial={{ x: -50, opacity: 0 }}
                    animate={{ x: 0, opacity: 1 }}
                    exit={{ x: 50, opacity: 0 }}
                    transition={{ duration: 0.6, ease: [0.16, 1, 0.3, 1] }}
                  >
                    <div className="flex items-center gap-4 mb-6">
                      <div className="h-[1px] w-12 bg-amber-500"></div>
                      <span className="text-amber-500 uppercase tracking-[0.3em] text-xs font-bold">
                        {current.department}
                      </span>
                    </div>
                    
                    <h2 className="serif text-4xl md:text-7xl leading-[0.9] tracking-tighter text-white mb-8">
                      {current.name.split(' ')[0]}<br/>
                      <span className="italic font-light text-gray-400">
                        {current.name.split(' ').slice(1).join(' ')}
                      </span>
                    </h2>
                    
                    <div className="space-y-6">
                      <p className="text-xl md:text-2xl text-amber-400 font-medium tracking-wide border-l-2 border-amber-500 pl-6">
                        {current.title}
                      </p>
                      <p className="text-gray-300 text-base md:text-xl max-w-lg leading-relaxed font-light">
                        {current.bio}
                      </p>
                      <a 
                        href={`mailto:${current.email}`} 
                        className="inline-flex items-center gap-2 text-amber-500 hover:text-white transition-colors text-sm font-mono mt-4 group"
                      >
                        <Icons.Mail />
                        <span className="border-b border-transparent group-hover:border-white transition-all truncate max-w-[200px] sm:max-w-none">{current.email}</span>
                      </a>
                    </div>
                  </MotionDiv>
                </AnimatePresence>

                <div className="flex items-center gap-8 pt-12">
                  <div className="flex gap-4">
                    <button 
                      onClick={prev}
                      className="w-12 h-12 md:w-14 md:h-14 rounded-full border border-white/10 flex items-center justify-center hover:bg-amber-500 hover:text-gray-900 transition-all duration-300 group"
                    >
                      <div className="group-hover:-translate-x-1 transition-transform">
                        <Icons.ArrowLeft />
                      </div>
                    </button>
                    <button 
                      onClick={next}
                      className="w-12 h-12 md:w-14 md:h-14 rounded-full border border-white/10 flex items-center justify-center hover:bg-amber-500 hover:text-gray-900 transition-all duration-300 group"
                    >
                      <div className="group-hover:translate-x-1 transition-transform">
                        <Icons.ArrowRight />
                      </div>
                    </button>
                  </div>
                  
                  <div className="text-sm font-mono text-gray-500 tracking-widest">
                    {String(index + 1).padStart(2, '0')} / {String(leadershipList.length).padStart(2, '0')}
                  </div>
                </div>
              </div>

              {/* Right Side: Image */}
              <div className="order-1 lg:order-2 relative aspect-[4/5] w-full max-w-sm mx-auto lg:ml-auto">
                <AnimatePresence mode="wait">
                  <MotionDiv
                    key={`img-${index}`}
                    initial={{ scale: 0.9, opacity: 0, x: 30 }}
                    animate={{ scale: 1, opacity: 1, x: 0 }}
                    exit={{ scale: 1.1, opacity: 0, x: -30 }}
                    transition={{ duration: 0.6, ease: [0.16, 1, 0.3, 1] }}
                    className="w-full h-full rounded-3xl overflow-hidden shadow-2xl border border-white/5 relative group"
                  >
                    <img 
                      src={current.imageUrl} 
                      className="w-full h-full object-cover transition-all duration-700 scale-105 group-hover:scale-100"
                      alt={current.name}
                      onError={(e) => { e.target.src = `https://picsum.photos/seed/${current.name}/800/1000`; }}
                    />
                    <div className="absolute inset-0 bg-gradient-to-t from-gray-900/90 via-transparent to-transparent"></div>
                  </MotionDiv>
                </AnimatePresence>
                
                {/* Decorative Elements */}
                <div className="absolute -bottom-10 -right-10 w-48 h-48 bg-amber-500/10 blur-[100px] rounded-full -z-10"></div>
                <div className="absolute -top-10 -left-10 w-32 h-32 bg-orange-500/10 blur-[80px] rounded-full -z-10"></div>
              </div>
            </div>

            {/* Progress Bar */}
            <div className="absolute bottom-0 left-0 w-full h-1 bg-white/5">
              <MotionDiv 
                key={index}
                initial={{ width: "0%" }}
                animate={{ width: "100%" }}
                transition={{ duration: 8, ease: "linear" }}
                className="h-full bg-amber-500 shadow-[0_0_10px_rgba(245,158,11,0.5)]"
              ></MotionDiv>
            </div>
          </div>
        );
      };

        const [isHeaderVisible, setIsHeaderVisible] = useState(true);
        useEffect(() => {
          const handleScroll = () => setIsHeaderVisible(window.scrollY < 100 || window.scrollY > 200);
          window.addEventListener('scroll', handleScroll);
          return () => window.removeEventListener('scroll', handleScroll);
        }, []);

        return (
          <div className="min-h-screen relative">
            {/* Background Video */}

                <div className="absolute inset-0 bg-gray-950/85 z-10"></div>
                <video
                  autoPlay
                  loop
                  muted
                  playsInline
                  className="absolute w-full h-full object-cover opacity-50"
                >
                  <source src="video/bghp.mp4" type="video/mp4" />
                  {/* Fallback if video missing */}
                  <source src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-circuit-board-1544-large.mp4" type="video/mp4" />
                </video>
            </div>

                    {/* Title Section */}
                    <div className="text-center mb-16">
                        <MotionDiv
                          initial={{ y: 20, opacity: 0 }}
                          animate={{ y: 0, opacity: 1 }}
                          className="inline-block px-4 py-1.5 rounded-full bg-amber-500/10 border border-amber-500/20 text-amber-500 text-xs font-bold tracking-widest uppercase mb-6"
                        >
                          Our Leadership
                        </MotionDiv>
                        <MotionH1 
                          initial={{ y: 20, opacity: 0 }}
                          animate={{ y: 0, opacity: 1 }}
                          transition={{ delay: 0.1 }}
                          className="text-4xl md:text-7xl font-black tracking-tighter mb-6"
                        >
                          <span className="text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-amber-400 to-orange-500">
                            Directors & Heads
                          </span>
                        </MotionH1>
                        <MotionP 
                          initial={{ y: 20, opacity: 0 }}

                          transition={{ delay: 0.2 }}
                          className="mt-6 text-lg md:text-xl text-gray-400 max-w-3xl mx-auto font-light leading-relaxed"
                        >
                          The strategic minds driving innovation and excellence at Teknologi KBSE.

                    </div>

                    <LeadershipSlider />

        );
      }

      // Render the app
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
