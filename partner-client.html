      const AnimatedSection = ({ children, className = '', delay = 0 }) => {
        const [isVisible, setIsVisible] = useState(false);
        const sectionRef = useRef(null);

        useEffect(() => {
          const observer = new IntersectionObserver(
            ([entry]) => {
              if (entry.isIntersecting) {
                setIsVisible(true);
                observer.unobserve(entry.target);
              }
            },
            { threshold: 0.1 }
          );
          if (sectionRef.current) observer.observe(sectionRef.current);
          return () => observer.disconnect();
        }, []);

        return (
          <div
            ref={sectionRef}
            className={`transition-all duration-1000 ease-out ${
              isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'
            } ${className}`}
            style={{ transitionDelay: `${delay}ms` }}
          >
            {children}
          </div>
        );

      const Parallax = ({ children, className = '', speed = 0.1, axis = 'y' }) => {
        const elRef = useRef(null);
        useEffect(() => {
          const handleScroll = () => {
            if (!elRef.current) return;
            const rect = elRef.current.getBoundingClientRect();
            const windowHeight = window.innerHeight;
            if (rect.bottom < 0 || rect.top > windowHeight) return;
            const progress = (rect.top + rect.height / 2 - windowHeight / 2) / (windowHeight / 2);
            const offset = -progress * speed * 100;
            elRef.current.style.transform = `translate${axis.toUpperCase()}(${offset}px) translateZ(0)`;
          };
          window.addEventListener('scroll', handleScroll, { passive: true });
          handleScroll();
          return () => window.removeEventListener('scroll', handleScroll);
        }, [speed, axis]);
        return <div ref={elRef} className={className}>{children}</div>;
      };
